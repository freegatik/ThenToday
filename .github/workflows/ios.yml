name: iOS

on:
  push:
    branches: [main, master]
  pull_request:

env:
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
  COVERAGE_MIN_LINE_PERCENT: "82"

jobs:
  lint:
    name: Lint (SwiftLint)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint version
          else
            brew install swiftlint
          fi

      - name: SwiftLint
        run: swiftlint lint --strict

  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          if [[ -d "/Applications/Xcode_16.2.app" ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            echo "Xcode_16.2.app not found; using default Xcode.app" >&2
            ls -la /Applications/ | grep -i xcode || true
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Prepare Xcode and iOS Simulator runtime
        run: |
          chmod +x .github/scripts/prepare-ios-ci.sh
          .github/scripts/prepare-ios-ci.sh
        timeout-minutes: 50

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild build \
            -project ThenToday.xcodeproj \
            -scheme ThenToday \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -quiet \
            EXCLUDED_ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=YES

  test:
    name: Test (iOS Simulator)
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          if [[ -d "/Applications/Xcode_16.2.app" ]]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            echo "Xcode_16.2.app not found; using default Xcode.app" >&2
            ls -la /Applications/ | grep -i xcode || true
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Prepare Xcode and iOS Simulator runtime
        run: |
          chmod +x .github/scripts/prepare-ios-ci.sh
          .github/scripts/prepare-ios-ci.sh
        timeout-minutes: 50

      - name: Run tests
        run: |
          set -euo pipefail
          chmod +x .github/scripts/ensure-ci-simulator.sh
          chmod +x .github/scripts/xcode-sim-destination.sh
          echo "=== simctl: iOS runtimes ==="
          xcrun simctl list runtimes | grep -i ios || true
          SIM_UDID="$(.github/scripts/ensure-ci-simulator.sh)"
          DEST="$(.github/scripts/xcode-sim-destination.sh ThenToday.xcodeproj ThenToday "${SIM_UDID}")"
          echo "Destination: ${DEST}"
          xcodebuild test \
            -project ThenToday.xcodeproj \
            -scheme ThenToday \
            -sdk iphonesimulator \
            -destination "${DEST}" \
            -maximum-parallel-testing-workers 1 \
            -quiet \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            EXCLUDED_ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=YES

      - name: Export code coverage (xcresult → xccov)
        if: success()
        run: |
          set -euo pipefail
          test -d TestResults.xcresult
          xcrun xccov view --report --json TestResults.xcresult > coverage-report.json
          xcrun xccov view --report TestResults.xcresult | tee coverage-summary.txt
          {
            echo '### Code coverage (lines)'
            echo ''
            echo 'Full JSON: artifact **coverage-reports** → `coverage-report.json`.'
            echo ''
            echo '```text'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage gate (ThenToday.app line %)
        if: success()
        run: python3 .github/scripts/coverage_gate.py coverage-report.json

      - name: Upload coverage (Codecov)
        if: success()
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-report.json
          name: then-today-ios
          fail_ci_if_error: false

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-report.json
            coverage-summary.txt
          if-no-files-found: ignore

      - name: Upload test results (.xcresult)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
